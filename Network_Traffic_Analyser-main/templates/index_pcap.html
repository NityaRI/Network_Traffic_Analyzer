<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCAP Analysis Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 10px; }
        .card-header { background-color: #343a40; color: white; border-radius: 10px 10px 0 0; }
        #results-area, #summary-area { display: none; }
        .spinner-border { width: 3rem; height: 3rem; }
        .plot-container, .report-container { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Advanced PCAP Analysis</h1>
        <div class="card">
            <div class="card-header">Upload PCAP File</div>
            <div class="card-body">
                <form id="upload-form" enctype="multipart/form-data">
                    <div class="custom-file">
                        <input type="file" class="custom-file-input" id="pcapFile" name="file" accept=".pcap,.pcapng,.cap">
                        <label class="custom-file-label" for="pcapFile">Choose file...</label>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Analyze</button>
                </form>
                <div id="loading-spinner" class="text-center mt-3" style="display: none;">
                    <div class="spinner-border text-primary"></div>
                    <p>Analyzing... this may take a moment.</p>
                </div>
            </div>
        </div>

        <div id="summary-area" class="mt-4">
            <div class="card">
                <div class="card-header">Analysis Summary</div>
                <div class="card-body">
                    <p><strong>File:</strong> <span id="summary-filename"></span></p>
                    <p><strong>Total Packets:</strong> <span id="summary-packets"></span></p>
                    <p><strong>Actionable Recommendations:</strong></p>
                    <ul id="recommendations-list"></ul>
                </div>
            </div>
        </div>

        <div id="results-area" class="mt-4">
            <div class="row">
                <div class="col-md-6">
                    <div class="plot-container card"><div class="card-header">Protocol Distribution</div><div class="card-body"><img id="protocol-plot" class="img-fluid"></div></div>
                </div>
                <div class="col-md-6">
                     <div class="plot-container card"><div class="card-header">Traffic Timeline</div><div class="card-body"><img id="timeline-plot" class="img-fluid"></div></div>
                </div>
            </div>
            <div class_="row">
                 <div class="col-md-12">
                    <div class="plot-container card"><div class="card-header">Feature Importance</div><div class="card-body"><img id="feature-plot" class="img-fluid"></div></div>
                </div>
            </div>
            <div class="report-container card">
                <div class="card-header">Detailed Reports</div>
                <div id="reports-list" class="list-group"></div>
            </div>
             <div class="report-container card">
                <div class="card-header">Data Preview</div>
                <div id="data-preview-container" class="table-responsive"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#upload-form').on('submit', function(e) {
                e.preventDefault();
                var formData = new FormData(this);
                $('#loading-spinner').show();

                $.ajax({
                    url: '/upload_pcap',
                    type: 'POST',
                    data: formData,
                    contentType: false,
                    processData: false,
                    success: function(data) {
                        if (data.error) {
                            alert('Error: ' + data.error);
                            return;
                        }
                        // Populate summary
                        $('#summary-filename').text(data.filename);
                        $('#summary-packets').text(data.total_packets);
                        var recommendationsList = data.recommendations.map(item => `<li>${item}</li>`).join('');
                        $('#recommendations-list').html(recommendationsList);

                        // Populate plots
                        $('#protocol-plot').attr('src', 'data:image/png;base64,' + data.protocol_distribution);
                        $('#timeline-plot').attr('src', 'data:image/png;base64,' + data.traffic_timeline);
                        $('#feature-plot').attr('src', 'data:image/png;base64,' + data.feature_importance);

                        // Populate reports
                        var reportsHtml = '';
                        for (const [key, value] of Object.entries(data.report_files)) {
                            reportsHtml += `<a href="${value}" class="list-group-item list-group-item-action" target="_blank">${key.replace('_', ' ').toUpperCase()}</a>`;
                        }
                        $('#reports-list').html(reportsHtml);
                        
                        // Populate data preview
                        $('#data-preview-container').html(data.data_preview);

                        $('#summary-area, #results-area').show();
                    },
                    error: function() {
                        alert('An unexpected error occurred during analysis.');
                    },
                    complete: function() {
                        $('#loading-spinner').hide();
                    }
                });
            });

            // Update file input label
            $('.custom-file-input').on('change', function() {
                var fileName = $(this).val().split('\\').pop();
                $(this).siblings('.custom-file-label').addClass("selected").html(fileName);
            });
        });
    </script>
</body>
</html>
